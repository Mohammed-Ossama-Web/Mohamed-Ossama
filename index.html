<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mohamed Ossama — Profile</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;600&display=swap');

    :root {
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --glow: #a855f7;
      --star-count: 200;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow-x: hidden;
      background: #030712;
      color: #e2e8f0;
      font-family: 'Rajdhani', sans-serif;
    }

    /* ───── STARFIELD ───── */
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur) ease-in-out infinite alternate,
                 drift var(--drift) linear infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%   { opacity: 0; transform: scale(0.8); }
      50%  { opacity: var(--op); }
      100% { opacity: 0.1; transform: scale(1.2); }
    }
    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-120vh); }
    }

    /* ───── NEBULA BLOBS ───── */
    .nebula {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .nebula-1 { width: 600px; height: 600px; top: -100px; left: -150px;
      background: radial-gradient(circle, rgba(124,58,237,.25) 0%, transparent 70%);
      animation: float1 12s ease-in-out infinite; }
    .nebula-2 { width: 500px; height: 500px; bottom: -80px; right: -100px;
      background: radial-gradient(circle, rgba(6,182,212,.2) 0%, transparent 70%);
      animation: float2 15s ease-in-out infinite; }
    .nebula-3 { width: 400px; height: 400px; top: 40%; left: 60%;
      background: radial-gradient(circle, rgba(168,85,247,.15) 0%, transparent 70%);
      animation: float1 18s ease-in-out infinite reverse; }
    @keyframes float1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(30px,40px) scale(1.05); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-40px,-30px) scale(1.08); }
    }

    /* ───── SHOOTING STARS ───── */
    .shoot {
      position: fixed; pointer-events: none; z-index: 1;
      width: 150px; height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0), #fff 50%, rgba(255,255,255,0));
      border-radius: 9999px;
      opacity: 0;
      animation: shoot var(--s-dur) ease-in var(--s-delay) infinite;
    }
    @keyframes shoot {
      0%   { opacity: 0; transform: translate(0,0) rotate(-35deg) scaleX(0); }
      10%  { opacity: 1; transform: translate(0,0) rotate(-35deg) scaleX(1); }
      90%  { opacity: 1; transform: translate(var(--s-x), var(--s-y)) rotate(-35deg) scaleX(1); }
      100% { opacity: 0; transform: translate(var(--s-x), var(--s-y)) rotate(-35deg) scaleX(0); }
    }

    /* ───── PAGE LAYOUT ───── */
    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 20px;
    }

    /* ───── PROFILE CARD ───── */
    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 520px; width: 100%;
      text-align: center;
      box-shadow:
        0 0 40px rgba(124,58,237,.15),
        0 0 80px rgba(6,182,212,.08),
        0 25px 50px rgba(0,0,0,.5);
      animation: cardIn 1.2s cubic-bezier(.16,1,.3,1) both;
      position: relative;
      overflow: hidden;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(60px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* card shimmer border */
    .card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(124,58,237,.6), rgba(6,182,212,.4), rgba(168,85,247,.6));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: borderSpin 4s linear infinite;
      pointer-events: none;
    }
    @keyframes borderSpin {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    /* ───── AVATAR ───── */
    .avatar-wrap {
      position: relative;
      width: 130px; height: 130px;
      margin: 0 auto 24px;
      animation: avatarIn 1.4s cubic-bezier(.16,1,.3,1) .2s both;
    }
    @keyframes avatarIn {
      from { opacity: 0; transform: scale(.5) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .avatar-ring {
      position: absolute; inset: -8px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #7c3aed, #06b6d4, #a855f7, #7c3aed);
      animation: spin 3s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-ring-inner {
      position: absolute; inset: 3px;
      border-radius: 50%;
      background: #030712;
    }
    .avatar {
      position: absolute; inset: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 50%, #a855f7 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,.5);
      letter-spacing: -2px;
      overflow: hidden;
    }
    /* Profile photo */
    .avatar-photo {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      border-radius: 50%;
    }
    /* Initials pulse (fallback) */
    .avatar-initials {
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); text-shadow: 0 0 20px rgba(255,255,255,.4); }
      50%      { transform: scale(1.08); text-shadow: 0 0 40px rgba(255,255,255,.8), 0 0 60px rgba(168,85,247,.6); }
    }

    /* ───── STATUS DOT ───── */
    .status-dot {
      position: absolute; bottom: 12px; right: 12px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #22c55e;
      border: 3px solid #030712;
      animation: statusPulse 1.8s ease-in-out infinite;
      z-index: 3;
    }
    @keyframes statusPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.6); }
      50%      { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }

    /* ───── NAME & TITLE ───── */
    .name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 900;
      background: linear-gradient(90deg, #7c3aed, #06b6d4, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200%;
      animation: nameIn 1.4s cubic-bezier(.16,1,.3,1) .4s both,
                 gradShift 3s ease-in-out infinite;
      letter-spacing: 2px;
      line-height: 1.1;
    }
    @keyframes nameIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes gradShift {
      0%,100% { background-position: 0%; }
      50%      { background-position: 100%; }
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 8px;
      animation: fadeUp 1.4s cubic-bezier(.16,1,.3,1) .6s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ───── DIVIDER ───── */
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, #7c3aed, #06b6d4);
      margin: 20px auto;
      border-radius: 9999px;
      animation: dividerIn 1.4s .7s both;
    }
    @keyframes dividerIn {
      from { opacity: 0; width: 0; }
      to   { opacity: 1; width: 60px; }
    }

    /* ───── BIO ───── */
    .bio {
      font-size: 15px;
      line-height: 1.8;
      color: #cbd5e1;
      animation: fadeUp 1.4s .8s both;
    }

    /* ───── SOCIAL HEADING ───── */
    .social-heading {
      font-size: 11px; color: #64748b;
      text-transform: uppercase; letter-spacing: 4px;
      margin-bottom: 20px;
      animation: fadeUp 1.4s 1s both;
    }

    /* ───── SOCIAL BUTTONS ───── */
    .socials {
      display: flex; flex-direction: column; gap: 14px;
      animation: fadeUp 1.4s 1.1s both;
    }

    .btn {
      position: relative;
      display: flex; align-items: center; gap: 14px;
      padding: 14px 22px;
      border-radius: 14px;
      border: none; cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px; font-weight: 600;
      text-decoration: none;
      color: #fff;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform .15s ease, box-shadow .15s ease;
      outline: none;
    }

    /* 3D press effect */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0; border-radius: inherit;
      background: rgba(255,255,255,.12);
      opacity: 0;
      transition: opacity .15s;
    }
    .btn:hover::after  { opacity: 1; }
    .btn:active { transform: translateY(3px) scale(.97); }
    .btn:hover  { transform: translateY(-4px) rotateX(6deg) rotateY(-2deg); }

    /* Bottom edge 3D face */
    .btn-edge {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 6px; border-radius: 0 0 14px 14px;
      pointer-events: none;
      transition: height .15s;
    }
    .btn:hover .btn-edge { height: 8px; }
    .btn:active .btn-edge { height: 2px; }

    /* Shimmer sweep */
    .btn-shimmer {
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
      transform: skewX(-20deg);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { left: -100%; }
      100% { left: 200%; }
    }

    .btn-icon {
      width: 28px; height: 28px; flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(255,255,255,.4));
      transition: transform .3s;
    }
    .btn:hover .btn-icon { transform: rotate(8deg) scale(1.15); }

    .btn-text { letter-spacing: 1px; }
    .btn-arrow {
      margin-left: auto; font-size: 18px;
      transition: transform .3s;
    }
    .btn:hover .btn-arrow { transform: translateX(4px); }

    /* ── Instagram ── */
    .btn-instagram {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      box-shadow:
        0 6px 20px rgba(220,39,67,.5),
        0 1px 0 rgba(255,255,255,.1) inset,
        0 0 0 1px rgba(255,255,255,.08);
    }
    .btn-instagram .btn-edge { background: linear-gradient(135deg, #a0632a, #9e462a, #8b1c2e, #7d1540, #6e0e51); }
    .btn-instagram:hover { box-shadow: 0 10px 30px rgba(220,39,67,.65), 0 0 0 1px rgba(255,255,255,.08); }

    /* ── Facebook ── */
    .btn-facebook {
      background: linear-gradient(135deg, #1877f2, #0a5ecc);
      box-shadow:
        0 6px 20px rgba(24,119,242,.5),
        0 1px 0 rgba(255,255,255,.1) inset,
        0 0 0 1px rgba(255,255,255,.08);
    }
    .btn-facebook .btn-edge { background: #0944a0; }
    .btn-facebook:hover { box-shadow: 0 10px 30px rgba(24,119,242,.65), 0 0 0 1px rgba(255,255,255,.08); }

    /* ── Snapchat ── */
    .btn-snapchat {
      background: linear-gradient(135deg, #fffc00, #f5e800);
      color: #1a1a1a;
      box-shadow:
        0 6px 20px rgba(255,252,0,.4),
        0 1px 0 rgba(255,255,255,.3) inset,
        0 0 0 1px rgba(255,255,255,.1);
    }
    .btn-snapchat .btn-text, .btn-snapchat .btn-arrow { color: #1a1a1a; }
    .btn-snapchat .btn-edge { background: #c8c300; }
    .btn-snapchat .btn-icon { filter: drop-shadow(0 0 6px rgba(0,0,0,.2)); }
    .btn-snapchat:hover { box-shadow: 0 10px 30px rgba(255,252,0,.55), 0 0 0 1px rgba(255,255,255,.1); }

    /* ── TikTok ── */
    .btn-tiktok {
      background: linear-gradient(135deg, #010101, #161616);
      box-shadow:
        0 6px 20px rgba(0,0,0,.6),
        0 1px 0 rgba(255,255,255,.08) inset,
        0 0 0 1px rgba(255,255,255,.08);
    }
    .btn-tiktok .btn-edge { background: #000; }
    .btn-tiktok:hover {
      box-shadow:
        0 10px 30px rgba(0,0,0,.7),
        0 0 20px rgba(105,201,241,.25),
        0 0 0 1px rgba(255,255,255,.08);
    }

    /* TikTok dual-color icon */
    .tiktok-icon { position: relative; width: 28px; height: 28px; }
    .tiktok-icon svg { position: absolute; top: 0; left: 0; }
    .tiktok-c { fill: #69c9f1; }
    .tiktok-r { fill: #ee1d52; }
    .tiktok-w { fill: #fff; }

    /* ───── FOOTER ───── */
    .footer {
      margin-top: 36px;
      font-size: 12px;
      color: #334155;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: fadeUp 1.8s 1.4s both;
    }
    .footer span {
      background: linear-gradient(90deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ───── ORBIT RING ───── */
    .orbit-container {
      position: absolute; inset: -60px; pointer-events: none;
      animation: orbitSpin 20s linear infinite;
    }
    @keyframes orbitSpin { to { transform: rotate(360deg); } }
    .orbit-dot {
      position: absolute; top: 50%; left: 50%;
      width: 8px; height: 8px; border-radius: 50%;
      margin: -4px;
      background: var(--c);
      box-shadow: 0 0 12px 2px var(--c);
    }
    .orbit-dot:nth-child(1) { transform: rotate(0deg) translateX(230px); --c: #7c3aed; }
    .orbit-dot:nth-child(2) { transform: rotate(90deg) translateX(230px); --c: #06b6d4; }
    .orbit-dot:nth-child(3) { transform: rotate(180deg) translateX(230px); --c: #a855f7; }
    .orbit-dot:nth-child(4) { transform: rotate(270deg) translateX(230px); --c: #38bdf8; }

    /* ───── PARTICLE BURST ───── */
    @keyframes particleBurst {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--px), var(--py)) scale(0); opacity: 0; }
    }
    .particle {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 999;
      animation: particleBurst .8s ease-out forwards;
    }
  </style>
</head>

<script>
  /* ── Stars ── */
  const sf = document.getElementById('starfield');
  const count = 220;
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + .5;
    const dur  = (Math.random() * 3 + 2).toFixed(2);
    const drift= (Math.random() * 60 + 40).toFixed(2);
    const op   = (Math.random() * .7 + .2).toFixed(2);
    const delay= (Math.random() * 8).toFixed(2);
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*200}%;
      width:${size}px; height:${size}px;
      --dur:${dur}s; --drift:${drift}s; --op:${op};
      animation-delay:-${delay}s,0s;
    `;
    sf.appendChild(s);
  }

  /* ── Particle burst on button click ── */
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const colors = ['#7c3aed','#06b6d4','#a855f7','#f09433','#fff'];
      for (let i = 0; i < 16; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (i / 16) * 2 * Math.PI;
        const dist  = 60 + Math.random() * 60;
        p.style.cssText = `
          left:${e.clientX}px; top:${e.clientY}px;
          width:${4 + Math.random()*4}px; height:${4 + Math.random()*4}px;
          background:${colors[i % colors.length]};
          --px:${Math.cos(angle)*dist}px;
          --py:${Math.sin(angle)*dist}px;
          animation-duration:${.5+Math.random()*.4}s;
        `;
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    });
  });

  /* ── 3D tilt on card ── */
  const card = document.getElementById('card');
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - .5;
    const y = (e.clientY - r.top)  / r.height - .5;
    card.style.transform = `perspective(800px) rotateX(${-y*8}deg) rotateY(${x*8}deg) scale(1.01)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.transform = 'perspective(800px) rotateX(0) rotateY(0) scale(1)';
    card.style.transition = 'transform .5s ease';
  });
  card.addEventListener('mouseenter', () => {
    card.style.transition = 'transform .1s ease';
  });
</script>
</body>
