<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mohamed Ossama</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#8b5cf6;
  --p2:#6d28d9;
  --c:#06b6d4;
  --c2:#0891b2;
  --pink:#ec4899;
  --gold:#f59e0b;
}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  background:#04040f;
  color:#e2e8f0;
  font-family:'Space Grotesk',sans-serif;
  overflow-x:hidden;
  cursor:none;
}

/* ══════ CUSTOM CURSOR ══════ */
#cursor{
  position:fixed;width:12px;height:12px;
  border-radius:50%;background:var(--p);
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,background .2s;
  mix-blend-mode:screen;
}
#cursor-ring{
  position:fixed;width:36px;height:36px;
  border-radius:50%;border:1.5px solid rgba(139,92,246,.5);
  pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:transform .08s ease,width .2s,height .2s;
}
body:has(.btn:hover) #cursor{width:50px;height:50px;background:rgba(139,92,246,.2)}
body:has(.btn:hover) #cursor-ring{opacity:0}

/* ══════ CANVAS BG ══════ */
#bg-canvas{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;
}

/* ══════ AURORA ══════ */
.aurora{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;overflow:hidden;
}
.aurora-band{
  position:absolute;
  border-radius:50%;filter:blur(80px);
  animation:auroraFloat var(--d) ease-in-out infinite alternate;
  opacity:.18;
}
.ab1{
  width:70vw;height:40vh;top:-10vh;left:-10vw;
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
  --d:14s;
}
.ab2{
  width:60vw;height:35vh;top:20vh;right:-10vw;
  background:linear-gradient(135deg,#06b6d4,#6d28d9);
  --d:18s;animation-delay:-5s;
}
.ab3{
  width:50vw;height:30vh;bottom:-5vh;left:20vw;
  background:linear-gradient(135deg,#f59e0b,#ec4899);
  --d:22s;animation-delay:-9s;opacity:.1;
}
@keyframes auroraFloat{
  from{transform:translate(0,0) scale(1) rotate(0deg)}
  to{transform:translate(4vw,3vh) scale(1.12) rotate(8deg)}
}

/* ══════ GRID OVERLAY ══════ */
.grid-overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(139,92,246,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(139,92,246,.03) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}

/* ══════ PAGE ══════ */
.page{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;
  padding:60px 20px;
  gap:0;
}

/* ══════ CARD ══════ */
.card{
  position:relative;
  width:min(480px,100%);
  border-radius:28px;
  padding:2px;
  background:linear-gradient(135deg,
    rgba(139,92,246,.6),
    rgba(6,182,212,.3),
    rgba(236,72,153,.4),
    rgba(139,92,246,.6));
  background-size:300% 300%;
  animation:borderAnim 6s linear infinite, cardEntrance 1.2s cubic-bezier(.16,1,.3,1) both;
  box-shadow:
    0 0 60px rgba(139,92,246,.2),
    0 0 120px rgba(6,182,212,.1),
    0 40px 80px rgba(0,0,0,.7);
}
@keyframes borderAnim{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
@keyframes cardEntrance{
  from{opacity:0;transform:translateY(80px) scale(.92)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.card-inner{
  border-radius:26px;
  background:linear-gradient(160deg,rgba(10,6,30,.97) 0%,rgba(4,4,20,.99) 100%);
  padding:44px 36px 40px;
  backdrop-filter:blur(40px);
  overflow:hidden;
  position:relative;
}

/* inner glow top */
.card-inner::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(139,92,246,.8),rgba(6,182,212,.6),transparent);
}
/* inner noise */
.card-inner::after{
  content:'';position:absolute;inset:0;border-radius:26px;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;opacity:.4;
}

/* ══════ FLOATING ORBS INSIDE CARD ══════ */
.card-orb{
  position:absolute;border-radius:50%;pointer-events:none;
  filter:blur(40px);opacity:.15;
  animation:orbFloat var(--od) ease-in-out infinite alternate;
}
.card-orb.o1{width:200px;height:200px;top:-60px;right:-60px;background:var(--p);--od:8s}
.card-orb.o2{width:150px;height:150px;bottom:-40px;left:-40px;background:var(--c);--od:11s;animation-delay:-4s}
@keyframes orbFloat{
  from{transform:translate(0,0) scale(1)}
  to{transform:translate(20px,15px) scale(1.1)}
}

/* ══════ AVATAR ══════ */
.avatar-section{
  display:flex;flex-direction:column;align-items:center;
  gap:0;margin-bottom:28px;
  animation:fadeSlideUp .8s .15s cubic-bezier(.16,1,.3,1) both;
}
.avatar-outer{
  position:relative;width:136px;height:136px;margin-bottom:0;
}
/* spinning gradient ring */
.avatar-spin-ring{
  position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(
    from 0deg,
    #8b5cf6,#06b6d4,#ec4899,#f59e0b,#8b5cf6
  );
  animation:ringSpinSlow 4s linear infinite;
}
@keyframes ringSpinSlow{to{transform:rotate(360deg)}}
.avatar-spin-ring-inner{
  position:absolute;inset:3px;border-radius:50%;
  background:#04040f;
}
/* pulsing halo */
.avatar-halo{
  position:absolute;inset:-16px;border-radius:50%;
  border:1px solid rgba(139,92,246,.25);
  animation:halo 2.5s ease-in-out infinite;
}
.avatar-halo2{
  position:absolute;inset:-28px;border-radius:50%;
  border:1px solid rgba(6,182,212,.12);
  animation:halo 2.5s ease-in-out infinite;animation-delay:.5s;
}
@keyframes halo{
  0%,100%{transform:scale(1);opacity:.4}
  50%{transform:scale(1.04);opacity:1}
}
.avatar-img{
  position:absolute;inset:7px;border-radius:50%;
  overflow:hidden;
  background:linear-gradient(135deg,#1e1040,#0c1a3a);
}
.avatar-img img{
  width:100%;height:100%;
  object-fit:cover;object-position:center top;
  border-radius:50%;
}
.avatar-img .av-fallback{
  width:100%;height:100%;
  display:none;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;
  font-size:36px;font-weight:900;
  background:linear-gradient(135deg,#8b5cf6,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
/* online badge */
.avatar-badge{
  position:absolute;bottom:10px;right:10px;z-index:5;
  width:20px;height:20px;border-radius:50%;
  background:#22c55e;
  border:3px solid #04040f;
  box-shadow:0 0 0 0 rgba(34,197,94,.6);
  animation:badgePulse 2s ease-in-out infinite;
}
@keyframes badgePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}
  50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}
}

/* ══════ NAME ══════ */
.name-section{
  text-align:center;
  animation:fadeSlideUp .8s .3s cubic-bezier(.16,1,.3,1) both;
}
.name{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(24px,6vw,32px);
  font-weight:900;
  letter-spacing:3px;
  line-height:1;
  background:linear-gradient(90deg,#c4b5fd,#ffffff,#67e8f9,#ffffff,#f9a8d4);
  background-size:300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:nameShimmer 5s linear infinite;
}
@keyframes nameShimmer{
  0%{background-position:0%}100%{background-position:300%}
}
/* name glow */
.name-glow{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(24px,6vw,32px);
  font-weight:900;
  letter-spacing:3px;
  line-height:1;
  position:absolute;
  color:transparent;
  -webkit-text-stroke:0;
  filter:blur(18px);
  opacity:.35;
  background:linear-gradient(90deg,#8b5cf6,#06b6d4,#ec4899);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  pointer-events:none;
  user-select:none;
  top:0;left:0;width:100%;
  animation:nameShimmer 5s linear infinite;
}
.name-wrap{position:relative;display:inline-block}

/* handle */
.handle{
  margin-top:8px;
  font-size:13px;
  font-weight:500;
  color:rgba(148,163,184,.6);
  letter-spacing:4px;
  text-transform:uppercase;
}

/* ══════ DIVIDER ══════ */
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(139,92,246,.3),rgba(6,182,212,.4),rgba(139,92,246,.3),transparent);
  margin:28px 0;
  animation:dividerGlow 3s ease-in-out infinite;
}
@keyframes dividerGlow{
  0%,100%{opacity:.5}50%{opacity:1}
}

/* ══════ SOCIAL LABEL ══════ */
.find-me{
  text-align:center;
  font-size:10px;font-weight:600;
  letter-spacing:5px;text-transform:uppercase;
  color:rgba(148,163,184,.4);
  margin-bottom:18px;
  animation:fadeSlideUp .8s .5s cubic-bezier(.16,1,.3,1) both;
}

/* ══════ SOCIAL BUTTONS ══════ */
.socials{
  display:flex;flex-direction:column;gap:12px;
  animation:fadeSlideUp .8s .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

.btn{
  position:relative;
  display:flex;align-items:center;gap:14px;
  padding:15px 20px;
  border-radius:16px;border:none;
  text-decoration:none;color:#fff;
  font-family:'Space Grotesk',sans-serif;
  font-size:15px;font-weight:600;
  overflow:hidden;
  cursor:none;
  transform-style:preserve-3d;
  will-change:transform;
  transition:transform .12s cubic-bezier(.16,1,.3,1),
             box-shadow .12s cubic-bezier(.16,1,.3,1);
}
.btn:hover{transform:translateY(-5px) scale(1.02) rotateX(4deg)}
.btn:active{transform:translateY(1px) scale(.98)}

/* ── gloss layer ── */
.btn-gloss{
  position:absolute;top:0;left:0;right:0;
  height:50%;border-radius:16px 16px 40% 40%;
  background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 100%);
  pointer-events:none;
}
/* ── shimmer sweep ── */
.btn-shimmer{
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.22) 50%,transparent 70%);
  transform:translateX(-100%);
  animation:sweep 3.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes sweep{
  0%,100%{transform:translateX(-100%)}
  50%{transform:translateX(200%)}
}
/* ── 3D bottom edge ── */
.btn-edge{
  position:absolute;bottom:0;left:0;right:0;
  height:4px;border-radius:0 0 16px 16px;
  pointer-events:none;
  transition:height .12s;
}
.btn:hover .btn-edge{height:6px}
.btn:active .btn-edge{height:1px}
/* ── glow behind button ── */
.btn::before{
  content:'';
  position:absolute;inset:-1px;border-radius:17px;
  opacity:0;
  transition:opacity .2s;
  z-index:-1;
}
.btn:hover::before{opacity:1}

.btn-icon-wrap{
  width:34px;height:34px;flex-shrink:0;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.12);
  transition:transform .3s cubic-bezier(.16,1,.3,1),
             background .2s;
}
.btn:hover .btn-icon-wrap{
  transform:rotate(8deg) scale(1.15);
  background:rgba(255,255,255,.2);
}
.btn-icon{width:20px;height:20px;display:block}
.btn-label{flex:1;letter-spacing:.5px}
.btn-sub{display:block;font-size:11px;font-weight:400;opacity:.6;margin-top:1px;letter-spacing:.5px}
.btn-chevron{
  font-size:20px;opacity:.5;
  transition:transform .2s,opacity .2s;
  flex-shrink:0;
}
.btn:hover .btn-chevron{transform:translateX(4px);opacity:1}

/* ── Instagram ── */
.btn-ig{
  background:linear-gradient(135deg,#833ab4 0%,#fd1d1d 50%,#fcb045 100%);
  box-shadow:0 8px 24px rgba(253,29,29,.3),0 2px 0 rgba(0,0,0,.3);
}
.btn-ig .btn-edge{background:linear-gradient(135deg,#5c2980,#b01515,#b07030)}
.btn-ig::before{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);filter:blur(14px)}
.btn-ig:hover{box-shadow:0 14px 36px rgba(253,29,29,.45),0 2px 0 rgba(0,0,0,.3)}

/* ── Facebook ── */
.btn-fb{
  background:linear-gradient(135deg,#1a77f2 0%,#0b5fd4 100%);
  box-shadow:0 8px 24px rgba(26,119,242,.35),0 2px 0 rgba(0,0,0,.3);
}
.btn-fb .btn-edge{background:#0944a0}
.btn-fb::before{background:linear-gradient(135deg,#1a77f2,#0b5fd4);filter:blur(14px)}
.btn-fb:hover{box-shadow:0 14px 36px rgba(26,119,242,.5),0 2px 0 rgba(0,0,0,.3)}

/* ── Snapchat ── */
.btn-sc{
  background:linear-gradient(135deg,#fffc00 0%,#f5e900 100%);
  box-shadow:0 8px 24px rgba(255,252,0,.3),0 2px 0 rgba(0,0,0,.3);
  color:#111;
}
.btn-sc .btn-label,.btn-sc .btn-sub,.btn-sc .btn-chevron{color:#111}
.btn-sc .btn-icon-wrap{background:rgba(0,0,0,.1)}
.btn-sc:hover .btn-icon-wrap{background:rgba(0,0,0,.15)}
.btn-sc .btn-edge{background:#c8c300}
.btn-sc::before{background:linear-gradient(135deg,#fffc00,#f5e900);filter:blur(14px)}
.btn-sc:hover{box-shadow:0 14px 36px rgba(255,252,0,.5),0 2px 0 rgba(0,0,0,.3)}
.btn-sc .btn-gloss{background:linear-gradient(180deg,rgba(255,255,255,.25) 0%,transparent 100%)}

/* ── TikTok ── */
.btn-tt{
  background:linear-gradient(135deg,#0d0d0d 0%,#1a1a1a 100%);
  box-shadow:0 8px 24px rgba(0,0,0,.5),0 2px 0 rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.06);
}
.btn-tt .btn-edge{background:#000}
.btn-tt::before{background:linear-gradient(135deg,rgba(105,201,241,.4),rgba(238,29,82,.4));filter:blur(14px)}
.btn-tt:hover{
  box-shadow:0 14px 36px rgba(0,0,0,.6),
             0 0 30px rgba(105,201,241,.2),
             0 0 30px rgba(238,29,82,.15),
             0 2px 0 rgba(0,0,0,.5);
}

/* ══════ FOOTER ══════ */
.footer{
  margin-top:32px;padding-top:24px;
  border-top:1px solid rgba(255,255,255,.04);
  text-align:center;
  animation:fadeSlideUp .8s .8s cubic-bezier(.16,1,.3,1) both;
}
.footer-dots{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:10px;
}
.dot{
  width:4px;height:4px;border-radius:50%;
  animation:dotPulse 2s ease-in-out infinite;
}
.dot:nth-child(1){background:var(--p);animation-delay:0s}
.dot:nth-child(2){background:var(--c);animation-delay:.3s}
.dot:nth-child(3){background:var(--pink);animation-delay:.6s}
@keyframes dotPulse{
  0%,100%{opacity:.3;transform:scale(.8)}
  50%{opacity:1;transform:scale(1.3)}
}
.footer-text{
  font-size:11px;color:rgba(148,163,184,.3);
  letter-spacing:3px;text-transform:uppercase;
}
.footer-text span{
  background:linear-gradient(90deg,var(--p),var(--c));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:.8;
}

/* ══════ PARTICLES ══════ */
.particle-container{
  position:fixed;inset:0;pointer-events:none;z-index:5;overflow:hidden;
}
.fp{
  position:absolute;border-radius:50%;
  background:var(--pc);
  width:var(--ps);height:var(--ps);
  opacity:0;
  animation:floatUp var(--pd) ease-in var(--pdelay) infinite;
}
@keyframes floatUp{
  0%{transform:translate(0,0);opacity:0}
  10%{opacity:.8}
  90%{opacity:.2}
  100%{transform:translate(var(--pmx),calc(var(--pmy) - 100vh));opacity:0}
}

/* ══════ CLICK BURST ══════ */
@keyframes burstOut{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1}
  100%{transform:translate(calc(-50% + var(--bx)),calc(-50% + var(--by))) scale(0);opacity:0}
}
.burst-p{
  position:fixed;width:6px;height:6px;border-radius:50%;
  pointer-events:none;z-index:9999;
  animation:burstOut .7s ease-out forwards;
}

/* ══════ SCAN LINE ══════ */
.scan-line{
  position:fixed;top:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(139,92,246,.5),rgba(6,182,212,.5),transparent);
  z-index:20;pointer-events:none;
  animation:scanMove 8s linear infinite;
  filter:blur(1px);
}
@keyframes scanMove{
  from{top:-2px}to{top:100vh}
}

/* ══════ AMBIENT SOUND BARS (decorative) ══════ */
.sound-bars{
  display:flex;align-items:flex-end;gap:3px;height:20px;
}
.bar{
  width:3px;border-radius:2px;
  background:linear-gradient(to top,var(--p),var(--c));
  animation:barBounce var(--bd) ease-in-out infinite alternate;
}
@keyframes barBounce{
  from{height:3px;opacity:.4}
  to{height:var(--bh);opacity:1}
}

/* ══════ HOVER RIPPLE ══════ */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.15);
  transform:scale(0);
  animation:rippleOut .6s ease-out forwards;
  pointer-events:none;
}
@keyframes rippleOut{
  to{transform:scale(4);opacity:0}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div class="scan-line"></div>
<canvas id="bg-canvas"></canvas>

<div class="aurora">
  <div class="aurora-band ab1"></div>
  <div class="aurora-band ab2"></div>
  <div class="aurora-band ab3"></div>
</div>
<div class="grid-overlay"></div>

<!-- Floating particles -->
<div class="particle-container" id="particles"></div>

<div class="page">
  <div class="card">
    <div class="card-inner">
      <div class="card-orb o1"></div>
      <div class="card-orb o2"></div>

      <!-- ── AVATAR ── -->
      <div class="avatar-section">
        <div class="avatar-outer">
          <div class="avatar-halo2"></div>
          <div class="avatar-halo"></div>
          <div class="avatar-spin-ring">
            <div class="avatar-spin-ring-inner"></div>
          </div>
          <div class="avatar-img">
            <img
              src="https://raw.githubusercontent.com/Mohammed-Ossama-Web/Mohamed-Ossama/main/5e4eb159-b1b9-4ca2-b549-6431ae007428.jpeg"
              alt="Mohamed Ossama"
              id="av-img"
              onerror="this.style.display='none';document.querySelector('.av-fallback').style.display='flex'"
            />
            <div class="av-fallback">MO</div>
          </div>
          <div class="avatar-badge"></div>
        </div>
      </div>

      <!-- ── NAME ── -->
      <div class="name-section">
        <div class="name-wrap">
          <div class="name-glow" aria-hidden="true">Mohamed Ossama</div>
          <h1 class="name">Mohamed Ossama</h1>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px">
          <div class="sound-bars">
            <div class="bar" style="--bd:.6s;--bh:14px"></div>
            <div class="bar" style="--bd:.4s;--bh:18px;animation-delay:.1s"></div>
            <div class="bar" style="--bd:.7s;--bh:10px;animation-delay:.2s"></div>
            <div class="bar" style="--bd:.5s;--bh:16px;animation-delay:.05s"></div>
            <div class="bar" style="--bd:.45s;--bh:20px;animation-delay:.15s"></div>

<script>
/* ── CURSOR ── */
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=mx+'px';cur.style.top=my+'px';
});
(function animRing(){
  rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
})();
document.addEventListener('mousedown',()=>{
  cur.style.transform='translate(-50%,-50%) scale(.7)';
});
document.addEventListener('mouseup',()=>{
  cur.style.transform='translate(-50%,-50%) scale(1)';
});

/* ── STAR CANVAS ── */
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
let W,H,stars=[];
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();window.addEventListener('resize',()=>{resize();initStars()});
function initStars(){
  stars=[];
  const count=Math.floor(W*H/3000);
  for(let i=0;i<count;i++){
    stars.push({
      x:Math.random()*W,
      y:Math.random()*H,
      r:Math.random()*1.5+.3,
      op:Math.random()*.8+.1,
      sp:Math.random()*.015+.003,
      phase:Math.random()*Math.PI*2,
      vx:(Math.random()-.5)*.05,
      vy:(Math.random()-.5)*.05,
      hue:Math.random()<.3?260:Math.random()<.5?180:0,
    });
  }
}
initStars();

/* constellation lines */
function drawConstellation(){
  const near=[];
  for(let i=0;i<stars.length;i++){
    for(let j=i+1;j<stars.length;j++){
      const dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100&&Math.random()<.003){
        near.push([i,j,dist]);
      }
    }
  }
  return near;
}
let lines=drawConstellation();
let lineTimer=0;

function drawStars(t){
  ctx.clearRect(0,0,W,H);
  for(let s of stars){
    s.x+=s.vx;s.y+=s.vy;
    if(s.x<0)s.x=W;if(s.x>W)s.x=0;
    if(s.y<0)s.y=H;if(s.y>H)s.y=0;
    const op=s.op*(0.5+0.5*Math.sin(t*.001+s.phase));
    ctx.beginPath();
    const grad=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*2.5);
    if(s.hue===260){
      grad.addColorStop(0,`rgba(200,180,255,${op})`);
      grad.addColorStop(1,'rgba(139,92,246,0)');
    }else if(s.hue===180){
      grad.addColorStop(0,`rgba(180,240,255,${op})`);
      grad.addColorStop(1,'rgba(6,182,212,0)');
    }else{
      grad.addColorStop(0,`rgba(255,255,255,${op})`);
      grad.addColorStop(1,'rgba(255,255,255,0)');
    }
    ctx.fillStyle=grad;
    ctx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);
    ctx.fill();
  }
  /* constellation */
  lineTimer++;
  if(lineTimer>300){lineTimer=0;lines=drawConstellation();}
  for(let [i,j,d] of lines){
    const op=Math.max(0,(1-d/100)*.06);
    ctx.beginPath();
    ctx.moveTo(stars[i].x,stars[i].y);
    ctx.lineTo(stars[j].x,stars[j].y);
    ctx.strokeStyle=`rgba(139,92,246,${op})`;
    ctx.lineWidth=.5;
    ctx.stroke();
  }
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

/* ── FLOATING PARTICLES ── */
const pc=document.getElementById('particles');
const pColors=['#8b5cf6','#06b6d4','#ec4899','#f59e0b','#a78bfa','#67e8f9'];
for(let i=0;i<35;i++){
  const el=document.createElement('div');
  el.className='fp';
  const s=(Math.random()*3+1).toFixed(1)+'px';
  el.style.cssText=`
    left:${Math.random()*100}%;
    top:${100+Math.random()*20}%;
    --ps:${s};--pc:${pColors[Math.floor(Math.random()*pColors.length)]};
    --pd:${(Math.random()*15+8).toFixed(1)}s;
    --pdelay:-${(Math.random()*20).toFixed(1)}s;
    --pmx:${(Math.random()*100-50).toFixed(0)}px;
    --pmy:${(Math.random()*60+20).toFixed(0)}px;
  `;
  pc.appendChild(el);
}

/* ── CARD 3D TILT ── */
const card=document.querySelector('.card');
let tiltX=0,tiltY=0,targetTX=0,targetTY=0;
card.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width-.5;
  const y=(e.clientY-r.top)/r.height-.5;
  targetTX=y*-10; targetTY=x*10;
});
card.addEventListener('mouseleave',()=>{targetTX=0;targetTY=0});
(function tiltLoop(){
  tiltX+=(targetTX-tiltX)*.08;
  tiltY+=(targetTY-tiltY)*.08;
  card.style.transform=`perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
  requestAnimationFrame(tiltLoop);
})();

/* ── BUTTON RIPPLE + BURST ── */
const burstColors=['#c4b5fd','#67e8f9','#f9a8d4','#fde68a','#ffffff'];
document.querySelectorAll('.btn').forEach(btn=>{
  btn.addEventListener('click',e=>{
    /* ripple */
    const r=btn.getBoundingClientRect();
    const ripple=document.createElement('div');
    ripple.className='ripple';
    const size=Math.max(r.width,r.height);
    ripple.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-r.left-size/2}px;top:${e.clientY-r.top-size/2}px`;
    btn.appendChild(ripple);
    ripple.addEventListener('animationend',()=>ripple.remove());
    /* burst */
    for(let i=0;i<20;i++){
      const p=document.createElement('div');
      p.className='burst-p';
      const ang=(i/20)*Math.PI*2;
      const dist=50+Math.random()*60;
      p.style.cssText=`
        left:${e.clientX}px;top:${e.clientY}px;
        width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;
        background:${burstColors[i%burstColors.length]};
        --bx:${Math.cos(ang)*dist}px;
        --by:${Math.sin(ang)*dist}px;
        animation-duration:${.5+Math.random()*.3}s;
      `;
      document.body.appendChild(p);
      p.addEventListener('animationend',()=>p.remove());
    }
  });
});
</script>
